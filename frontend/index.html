<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuminaLand — Le métaverse illuminé par l’IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .neon { text-shadow: 0 0 20px #22d3ee, 0 0 40px #a855f7; }
  </style>
</head>
<body class="bg-black text-white">

  <nav class="fixed top-0 w-full bg-black/80 backdrop-blur-lg border-b border-cyan-500/30 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="text-3xl font-bold neon">LuminaLand</div>
      <div class="hidden md:flex gap-8">
        <a href="#" class="hover:text-cyan-400">Créer avec l’IA</a>
        <a href="#" class="hover:text-cyan-400">Plots</a>
        <a href="#" class="hover:text-cyan-400">Explorer</a>
      </div>
      <button onclick="alert('Connecté ! Bienvenue dans LuminaLand Beta ✨')" class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-full font-semibold">
        Entrer dans le métaverse
      </button>
    </div>
  </nav>

  <section class="min-h-screen flex items-center justify-center bg-[radial-gradient(at_center,#1e1b4b_0%,#000_70%)] relative overflow-hidden">
    <div class="text-center px-6 relative z-10">
      <h1 class="text-7xl md:text-8xl font-black neon tracking-tighter mb-6">
        LE MONDE<br>QUE L’IA RÊVE
      </h1>
      <p class="text-2xl md:text-3xl text-cyan-300 mb-12 max-w-2xl mx-auto">
        Crée, explore, gagne.<br>Tout généré instantanément par intelligence artificielle.
      </p>
      <button onclick="alert('Bienvenue dans LuminaLand Beta ! Ton premier plot gratuit arrive ✨')" class="px-12 py-6 text-2xl font-bold bg-gradient-to-r from-cyan-400 to-purple-600 rounded-3xl hover:scale-110 transition">
        ENTRER MAINTENANT
      </button>
    </div>
  </section>

  <footer class="py-12 text-center text-sm text-gray-500">
    © 2026 LuminaLand-Lab – Licensed under BSL 1.1<br>
    Commercial use prohibited until February 28, 2030
  </footer>

</body>
</html>
